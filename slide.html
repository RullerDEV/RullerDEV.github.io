<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>PDF Presenter</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #050505;
      --timeline-color: #38bdf8;
      --safe-padding: 0px;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-width: 100%;
      height: 100%;
      min-height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      user-select: none;
      touch-action: manipulation;
    }

    #stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      width: 100dvw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      display: grid;
      place-items: center;
      background: var(--bg);
    }

    canvas {
      display: block;
      background: white;
      max-width: 100vw;
      max-width: 100dvw;
      max-height: 100vh;
      max-height: 100dvh;
    }

    #loading {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: grid;
      place-items: center;
      color: rgba(255,255,255,.68);
      font-size: 14px;
      background: var(--bg);
    }

    #error {
      position: fixed;
      inset: 0;
      z-index: 90;
      display: none;
      place-items: center;
      text-align: center;
      color: white;
      padding: 30px;
      line-height: 1.5;
      background: var(--bg);
    }

    .zone {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 50vw;
      z-index: 5;
    }

    #prevZone {
      left: 0;
    }

    #nextZone {
      right: 0;
    }

    #counter {
      position: fixed;
      right: max(16px, env(safe-area-inset-right));
      bottom: max(14px, env(safe-area-inset-bottom));
      z-index: 55;

      color: rgba(255, 255, 255, 0.86);
      background: rgba(0, 0, 0, 0.42);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);

      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 650;

      opacity: 0;
      transform: translateY(4px);
      transition: opacity .18s ease, transform .18s ease;
      pointer-events: none;
    }

    body:hover #counter,
    body.show-ui #counter {
      opacity: 1;
      transform: translateY(0);
    }

    #flash {
      position: fixed;
      left: 50%;
      bottom: max(92px, calc(env(safe-area-inset-bottom) + 92px));
      transform: translateX(-50%);
      z-index: 60;
      color: rgba(255,255,255,.78);
      background: rgba(0,0,0,.38);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 999px;
      padding: 8px 13px;
      font-size: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease;
      white-space: nowrap;
    }

    #bottomHoverArea {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 128px;
      z-index: 40;
    }

    #timeline {
      position: fixed;
      left: 50%;
      bottom: max(18px, calc(env(safe-area-inset-bottom) + 18px));
      transform: translateX(-50%) translateY(18px);
      width: min(760px, calc(100vw - 36px));
      width: min(760px, calc(100dvw - 36px));
      z-index: 70;

      padding: 12px 14px 14px;
      border-radius: 18px;

      background: rgba(8, 10, 14, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(18px);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);

      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
    }

    #bottomHoverArea:hover + #timeline,
    #timeline:hover,
    body.show-ui #timeline {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    #bottomHoverArea:hover ~ #counter,
    #timeline:hover ~ #counter,
    body.show-ui #counter.hide-when-timeline {
      opacity: 0;
    }

    #timelineInfo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: rgba(255, 255, 255, 0.93);
      font-size: 13px;
      font-weight: 650;
      margin-bottom: 8px;
      text-align: center;
    }

    #fitLabel {
      color: rgba(255, 255, 255, .62);
      font-size: 11px;
      font-weight: 600;
    }

    #timelineRange {
      width: 100%;
      height: 8px;
      margin: 0;
      appearance: none;
      -webkit-appearance: none;
      background: linear-gradient(
        to right,
        var(--timeline-color) 0%,
        var(--timeline-color) var(--progress, 0%),
        rgba(255,255,255,.26) var(--progress, 0%),
        rgba(255,255,255,.26) 100%
      );
      border-radius: 999px;
      outline: none;
      cursor: pointer;
    }

    #timelineRange::-webkit-slider-thumb {
      appearance: none;
      -webkit-appearance: none;
      width: 19px;
      height: 19px;
      border-radius: 50%;
      background: #ffffff;
      border: 3px solid var(--timeline-color);
      box-shadow: 0 0 0 5px rgba(56,189,248,.2);
    }

    #timelineRange::-moz-range-thumb {
      width: 19px;
      height: 19px;
      border-radius: 50%;
      background: #ffffff;
      border: 3px solid var(--timeline-color);
      box-shadow: 0 0 0 5px rgba(56,189,248,.2);
    }

    #timelineRange::-moz-range-track {
      height: 8px;
      border-radius: 999px;
      background: transparent;
    }

    @media (max-width: 640px) {
      #timeline {
        width: calc(100vw - 24px);
        width: calc(100dvw - 24px);
        padding: 10px 12px 12px;
      }

      #timelineInfo {
        font-size: 12px;
      }

      #fitLabel {
        display: none;
      }

      #flash {
        bottom: max(84px, calc(env(safe-area-inset-bottom) + 84px));
        max-width: calc(100vw - 24px);
        overflow: hidden;
        text-overflow: ellipsis;
      }

      #counter {
        right: max(12px, env(safe-area-inset-right));
        bottom: max(10px, env(safe-area-inset-bottom));
      }
    }
  </style>
</head>

<body>
  <div id="stage">
    <canvas id="canvas"></canvas>
  </div>

  <div id="prevZone" class="zone" aria-label="Página anterior"></div>
  <div id="nextZone" class="zone" aria-label="Próxima página"></div>

  <div id="loading">Carregando PDF...</div>

  <div id="error">
    Não consegui carregar o PDF.<br>
    Se der CORS, hospede o HTML e o PDF no mesmo domínio ou use arquivo local via localhost.
  </div>

  <div id="bottomHoverArea"></div>

  <div id="timeline">
    <div id="timelineInfo">
      <span>Slide <span id="pageNow">1</span> de <span id="pageTotal">?</span></span>
      <span id="fitLabel">modo: ajustar</span>
    </div>

    <input id="timelineRange" type="range" min="1" max="1" value="1" aria-label="Linha do tempo dos slides">
  </div>

  <div id="counter">
    <span id="counterNow">1</span>/<span id="counterTotal">?</span>
  </div>

  <div id="flash">F = tela cheia · C = cobrir/ajustar · ← → = navegar</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <script>
    const PDF_URL = "https://rullerdev.github.io/country.pdf";

    /*
      contain = responsivo sem cortar slide
      cover   = cobre a tela inteira e pode cortar bordas

      O padrão agora é contain para NÃO cortar.
      Aperte C para alternar entre ajustar e cobrir.
    */
    let fitMode = "contain";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const loading = document.getElementById("loading");
    const errorBox = document.getElementById("error");

    const pageNow = document.getElementById("pageNow");
    const pageTotal = document.getElementById("pageTotal");

    const counterNow = document.getElementById("counterNow");
    const counterTotal = document.getElementById("counterTotal");

    const timelineRange = document.getElementById("timelineRange");
    const flash = document.getElementById("flash");
    const fitLabel = document.getElementById("fitLabel");

    let pdf = null;
    let currentPage = 1;
    let rendering = false;
    let pendingPage = null;
    let activeRenderTask = null;

    function viewportSize() {
      const visual = window.visualViewport;
      return {
        width: Math.max(1, Math.floor(visual ? visual.width : window.innerWidth)),
        height: Math.max(1, Math.floor(visual ? visual.height : window.innerHeight))
      };
    }

    function getScale(viewport) {
      const size = viewportSize();
      const scaleX = size.width / viewport.width;
      const scaleY = size.height / viewport.height;

      return fitMode === "cover"
        ? Math.max(scaleX, scaleY)
        : Math.min(scaleX, scaleY);
    }

    function updateUi(num) {
      pageNow.textContent = num;
      pageTotal.textContent = pdf.numPages;

      counterNow.textContent = num;
      counterTotal.textContent = pdf.numPages;

      timelineRange.max = pdf.numPages;
      timelineRange.value = num;

      fitLabel.textContent = fitMode === "cover" ? "modo: cobrir" : "modo: ajustar";

      const progress =
        pdf.numPages <= 1
          ? 100
          : ((num - 1) / (pdf.numPages - 1)) * 100;

      timelineRange.style.setProperty("--progress", `${progress}%`);
    }

    async function renderPage(num) {
      if (!pdf) return;

      rendering = true;

      try {
        if (activeRenderTask) {
          activeRenderTask.cancel();
          activeRenderTask = null;
        }

        const page = await pdf.getPage(num);
        const baseViewport = page.getViewport({ scale: 1 });
        const scale = getScale(baseViewport);
        const viewport = page.getViewport({ scale });
        const ratio = window.devicePixelRatio || 1;

        canvas.width = Math.floor(viewport.width * ratio);
        canvas.height = Math.floor(viewport.height * ratio);
        canvas.style.width = `${Math.floor(viewport.width)}px`;
        canvas.style.height = `${Math.floor(viewport.height)}px`;

        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
        ctx.clearRect(0, 0, viewport.width, viewport.height);

        activeRenderTask = page.render({
          canvasContext: ctx,
          viewport
        });

        await activeRenderTask.promise;
        activeRenderTask = null;

        updateUi(num);
        loading.style.display = "none";
      } catch (err) {
        if (err && err.name === "RenderingCancelledException") return;
        console.error(err);
      } finally {
        rendering = false;

        if (pendingPage !== null) {
          const next = pendingPage;
          pendingPage = null;
          renderPage(next);
        }
      }
    }

    function queueRender(num) {
      if (rendering) {
        pendingPage = num;
      } else {
        renderPage(num);
      }
    }

    function nextPage() {
      if (!pdf || currentPage >= pdf.numPages) return;
      currentPage++;
      queueRender(currentPage);
    }

    function prevPage() {
      if (!pdf || currentPage <= 1) return;
      currentPage--;
      queueRender(currentPage);
    }

    function goToPage(num) {
      if (!pdf) return;
      const target = Math.min(Math.max(Number(num), 1), pdf.numPages);
      currentPage = target;
      queueRender(currentPage);
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    }

    function toggleFitMode() {
      fitMode = fitMode === "contain" ? "cover" : "contain";
      queueRender(currentPage);
      showFlash(fitMode === "cover" ? "Modo cobrir: pode cortar bordas" : "Modo ajustar: sem cortar slide");
    }

    function showFlash(text) {
      flash.textContent = text || "F = tela cheia · C = cobrir/ajustar · ← → = navegar";
      flash.style.opacity = "1";
      document.body.classList.add("show-ui");

      clearTimeout(window.__flashTimer);
      window.__flashTimer = setTimeout(() => {
        flash.style.opacity = "0";
        document.body.classList.remove("show-ui");
      }, 1800);
    }

    document.getElementById("prevZone").onclick = prevPage;
    document.getElementById("nextZone").onclick = nextPage;

    timelineRange.addEventListener("input", () => {
      goToPage(timelineRange.value);
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight" || e.key === " " || e.key === "PageDown") {
        e.preventDefault();
        nextPage();
      }

      if (e.key === "ArrowLeft" || e.key === "PageUp") {
        e.preventDefault();
        prevPage();
      }

      if (e.key.toLowerCase() === "f") {
        e.preventDefault();
        toggleFullscreen();
      }

      if (e.key.toLowerCase() === "c") {
        e.preventDefault();
        toggleFitMode();
      }

      if (e.key.toLowerCase() === "h") {
        e.preventDefault();
        showFlash();
      }

      if (e.key === "Home") {
        e.preventDefault();
        goToPage(1);
      }

      if (e.key === "End" && pdf) {
        e.preventDefault();
        goToPage(pdf.numPages);
      }
    });

    function scheduleResponsiveRender() {
      if (!pdf) return;
      clearTimeout(window.__resizeTimer);
      window.__resizeTimer = setTimeout(() => {
        queueRender(currentPage);
      }, 120);
    }

    window.addEventListener("resize", scheduleResponsiveRender);
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", scheduleResponsiveRender);
    }

    document.addEventListener("fullscreenchange", () => {
      if (!pdf) return;
      setTimeout(() => queueRender(currentPage), 120);
    });

    pdfjsLib.getDocument(PDF_URL).promise
      .then((doc) => {
        pdf = doc;

        timelineRange.max = doc.numPages;
        timelineRange.value = currentPage;

        pageTotal.textContent = doc.numPages;
        counterTotal.textContent = doc.numPages;

        renderPage(currentPage);
        showFlash("Modo ajustar ativado: slide inteiro sem cortar");
      })
      .catch((err) => {
        console.error(err);
        loading.style.display = "none";
        errorBox.style.display = "grid";
        canvas.style.display = "none";
      });
  </script>
</body>
</html>
